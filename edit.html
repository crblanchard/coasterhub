<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editor — Coaster Hub</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root { --ink:#14110f; --muted:#6b6459; --line:#e5ddd0; --bg:#faf7f2; --accent:#b4471f; --ok:#0a7d2c; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); }

  .card { max-width:420px; margin:14vh auto; background:#fff; border:1px solid var(--line); border-radius:14px; padding:28px; box-shadow:0 6px 24px rgba(0,0,0,.05); }
  .card h1 { margin:0 0 4px; font-size:1.35rem; }
  .sub { color:var(--muted); font-size:.95rem; }
  label { display:block; font-size:.72rem; color:var(--muted); margin:0 0 5px; text-transform:uppercase; letter-spacing:.04em; }
  input, select { width:100%; padding:9px 11px; font-size:.95rem; border:1px solid #cfc7ba; border-radius:8px; background:#fff; }
  button { font-size:.9rem; font-weight:600; border:0; border-radius:8px; background:var(--ink); color:#fff; cursor:pointer; padding:9px 13px; }
  button:hover { background:#000; }
  button.ghost { background:#fff; color:var(--ink); border:1px solid #cfc7ba; }
  button.ghost:hover { background:#f2ece2; }
  button.ghost.on { background:#efe7d9; }
  button.danger { background:#fff; color:var(--accent); border:1px solid #e3b3a6; }
  .msg { margin-top:12px; font-size:.9rem; min-height:1.1em; }
  .bad { color:var(--accent); } .good { color:var(--ok); }

  #app { display:none; }
  header.bar { position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid var(--line); padding:10px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header.bar h1 { font-size:1.05rem; margin:0; }
  header.bar .grow { flex:1; }
  header.bar .count { color:var(--muted); font-size:.82rem; }
  .seg { display:flex; border:1px solid #cfc7ba; border-radius:8px; overflow:hidden; }
  .seg button { border:0; border-radius:0; background:#fff; color:var(--muted); padding:8px 12px; }
  .seg button.on { background:var(--ink); color:#fff; }
  .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:0; height:calc(100vh - 54px); }
  @media (max-width:820px){ .wrap { grid-template-columns:1fr; height:auto; } }
  .list { overflow:auto; border-right:1px solid var(--line); }
  .row { padding:9px 16px; border-bottom:1px solid #f0e9dd; cursor:pointer; font-size:.9rem; }
  .row:hover { background:#f6f0e6; }
  .row.sel { background:#efe7d9; }
  .row .nm { font-weight:600; }
  .row .pk { color:var(--muted); font-size:.82rem; }
  .pin { font-size:.9rem; margin-right:5px; }
  .pin.on { color:var(--ok); } .pin.off { color:#c9a99f; }
  .badge { display:inline-block; font-size:.68rem; padding:1px 6px; border-radius:20px; margin-left:6px; vertical-align:middle; }
  .badge.inc { background:#fbe6de; color:var(--accent); }
  .badge.nomap { background:#fbe6de; color:var(--accent); }
  .badge.onmap { background:#e0f0e4; color:var(--ok); }
  .editor { overflow:auto; padding:20px 22px; }
  .editor .empty { color:var(--muted); margin-top:40px; text-align:center; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .grid .full { grid-column:1 / -1; }
  .actions { margin-top:18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .toast { margin-left:auto; font-size:.9rem; }
  .toolbar { margin-top:22px; padding-top:16px; border-top:1px dashed var(--line); }
  .toolbar h3 { margin:0 0 6px; font-size:.85rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .inline { display:flex; gap:8px; align-items:center; }
  .hint { color:var(--muted); font-size:.82rem; margin:4px 0 0; }
  .cbrow { display:flex; align-items:center; gap:6px; font-size:.85rem; color:var(--muted); }
  .cbrow input { width:auto; }
  a.osm { color:#2a6db0; font-size:.85rem; }
</style>
</head>
<body>
  <div class="card" id="gate">
    <h1>Coaster Hub — Editor</h1>
    <p class="sub">Admin only. Enter the password to continue.</p>
    <div style="margin-top:16px"><label for="pw">Admin password</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <div style="margin-top:14px"><button id="go" style="width:100%">Unlock</button></div>
    <div class="msg" id="msg"></div>
  </div>

  <div id="app">
    <header class="bar">
      <div class="seg"><button id="mCoasters" class="on">Coasters</button><button id="mParks">Parks</button></div>
      <input id="q" placeholder="Search…" style="max-width:220px">
      <label class="cbrow" id="fIncWrap"><input type="checkbox" id="incOnly"> Only incomplete</label>
      <label class="cbrow" id="fGeoWrap"><input type="checkbox" id="ungeoOnly"> Only un-geocoded</label>
      <span class="count" id="count"></span>
      <span class="grow"></span>
      <span class="count" id="geosum"></span>
      <button class="ghost" id="geo">Geocode missing parks</button>
      <span class="count" id="geostat"></span>
      <a href="/" style="color:var(--muted);font-size:.85rem;text-decoration:none">← Site</a>
    </header>
    <div class="wrap">
      <div class="list" id="list"></div>
      <div class="editor" id="editor"><div class="empty">Select an item to edit.</div></div>
    </div>
  </div>

  <script>
  var TOKEN = "";
  var state = { mode:"coasters", coasters: [], byId: {}, sel: null, opts: { loc:[], manu:[], model:[] },
                geo: {}, parks: [], selPark: null };

  var FIELDS = [
    ["name","Name","text"], ["park","Park","text"],
    ["loc","Location (e.g. \"Ohio, US\" or \"Japan\")","list"], ["type","Type","type"],
    ["manu","Manufacturer","list"], ["model","Model","list"],
    ["h","Height (ft)","num"], ["s","Speed (mph)","num"], ["l","Length (ft)","num"],
    ["inv","Inversions","int"], ["dur","Duration (sec)","int"], ["laps","Laps","int"],
    ["yr","Year","int"], ["opened","Opened (YYYY-MM-DD)","text"], ["closed","Closed (YYYY-MM-DD)","text"]
  ];
  function fieldKind(k){ for (var i=0;i<FIELDS.length;i++) if (FIELDS[i][0]===k) return FIELDS[i][2]; return "text"; }
  function incomplete(c){ return !c.type || c.h==null || c.s==null || c.l==null; }
  function geocoded(park){ return !!(park && state.geo[park]); }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m];}); }

  async function api(method, path, body){
    var opt = { method: method, headers: { "x-admin-token": TOKEN } };
    if (body){ opt.headers["content-type"]="application/json"; opt.body=JSON.stringify(body); }
    var r = await fetch(path, opt);
    var data = null; try { data = await r.json(); } catch(e){}
    if (!r.ok) throw new Error((data && data.error) || ("HTTP " + r.status));
    return data;
  }

  // ---------- login ----------
  var pw=document.getElementById('pw'), msg=document.getElementById('msg');
  function showMsg(t,c){ msg.textContent=t; msg.className="msg "+(c||""); }
  async function unlock(){
    var p = pw.value; if(!p){ showMsg("Enter a password.","bad"); return; }
    showMsg("Checking…");
    try {
      var r = await fetch('/api/admin/login',{ method:"POST", headers:{ "x-admin-token": p } });
      if (r.ok){
        TOKEN = p; try{ sessionStorage.setItem('ch_admin', p); }catch(e){}
        document.getElementById('gate').style.display="none";
        document.getElementById('app').style.display="block";
        boot();
      } else if (r.status===401){ showMsg("Incorrect password — or ADMIN_PASSWORD isn’t set on the Worker yet.","bad"); }
      else { showMsg("Unexpected response ("+r.status+").","bad"); }
    } catch(e){ showMsg("Network error: "+e.message,"bad"); }
  }
  document.getElementById('go').addEventListener('click', unlock);
  pw.addEventListener('keydown', function(e){ if(e.key==="Enter") unlock(); });
  try { var saved=sessionStorage.getItem('ch_admin'); if(saved){ pw.value=saved; } } catch(e){}

  // ---------- boot ----------
  function distinct(key){
    var s={}; state.coasters.forEach(function(c){ if(c[key]!=null && c[key]!=="") s[c[key]]=1; });
    return Object.keys(s).sort(function(a,b){ return a.localeCompare(b,undefined,{sensitivity:"base"}); });
  }
  async function loadGeo(){
    var parks = await api("GET","/api/parks");         // { name: {lat,lon,region} } — only geocoded parks
    state.geo = {}; Object.keys(parks).forEach(function(n){ if(parks[n] && parks[n].lat!=null) state.geo[n]=parks[n]; });
  }
  async function boot(){
    var d = await api("GET","/api/coasters");
    state.coasters = d.coasters;
    state.byId = {}; state.coasters.forEach(function(c){ state.byId[c.id]=c; });
    state.opts = { loc:distinct("loc"), manu:distinct("manu"), model:distinct("model") };
    await loadGeo();
    document.getElementById('q').addEventListener('input', render);
    document.getElementById('incOnly').addEventListener('change', render);
    document.getElementById('ungeoOnly').addEventListener('change', render);
    document.getElementById('geo').addEventListener('click', geocode);
    document.getElementById('mCoasters').addEventListener('click', function(){ setMode('coasters'); });
    document.getElementById('mParks').addEventListener('click', function(){ setMode('parks'); });
    document.getElementById('list').addEventListener('click', function(e){
      var row = e.target.closest ? e.target.closest('.row[data-id]') : null;
      if (!row) return;
      if (state.mode==='coasters') selectCoaster(+row.getAttribute('data-id'));
      else selectPark(row.getAttribute('data-id'));
    });
    render();
  }

  function setMode(m){
    state.mode = m;
    document.getElementById('mCoasters').classList.toggle('on', m==='coasters');
    document.getElementById('mParks').classList.toggle('on', m==='parks');
    document.getElementById('fIncWrap').style.display = m==='coasters' ? '' : 'none';
    document.getElementById('fGeoWrap').style.display = m==='coasters' ? '' : 'none';
    document.getElementById('editor').innerHTML = '<div class="empty">Select an item to edit.</div>';
    if (m==='parks' && !state.parks.length) loadParks(); else render();
  }

  function render(){ if (state.mode==='coasters') renderCoasters(); else renderParks(); updateGeoSummary(); }
  function updateGeoSummary(){
    var total = Object.keys(state.coasters.reduce(function(a,c){ if(c.park) a[c.park]=1; return a; }, {})).length;
    var on = Object.keys(state.geo).length;
    document.getElementById('geosum').textContent = on + " / " + total + " parks on map";
  }

  // ---------- coasters ----------
  function matches(){
    var q = document.getElementById('q').value.trim().toLowerCase();
    var incOnly = document.getElementById('incOnly').checked;
    var ungeo = document.getElementById('ungeoOnly').checked;
    return state.coasters.filter(function(c){
      if (incOnly && !incomplete(c)) return false;
      if (ungeo && geocoded(c.park)) return false;
      if (!q) return true;
      return (c.name||"").toLowerCase().indexOf(q)>=0 || (c.park||"").toLowerCase().indexOf(q)>=0;
    });
  }
  function renderCoasters(){
    var rows = matches().sort(function(a,b){
      return (a.park||"").localeCompare(b.park||"", undefined, {sensitivity:"base"})
          || (a.name||"").localeCompare(b.name||"", undefined, {sensitivity:"base"});
    });
    document.getElementById('count').textContent = rows.length + " of " + state.coasters.length;
    document.getElementById('list').innerHTML = rows.map(function(c){
      var on = geocoded(c.park);
      var pin = '<span class="pin '+(on?'on':'off')+'" title="'+(on?'park is on the map':'park not geocoded')+'">'+(on?'●':'○')+'</span>';
      return '<div class="row'+(state.sel===c.id?' sel':'')+'" data-id="'+c.id+'">'+
        '<div class="nm">'+pin+esc(c.name)+ (incomplete(c)?'<span class="badge inc">needs stats</span>':'') +'</div>'+
        '<div class="pk">'+esc(c.park||"—")+' · '+esc(c.loc||"—")+' · #'+c.id+'</div></div>';
    }).join("");
  }
  function fieldControl(c, f){
    var key=f[0], kind=f[2], val=c[key]==null?"":c[key];
    if (kind==="type"){
      var opts=["Steel","Wood"]; if (val && opts.indexOf(val)<0) opts.push(val);
      return '<select data-k="type">'+opts.map(function(o){ return '<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>'; }).join("")+'</select>';
    }
    if (kind==="list"){
      var id="dl_"+key;
      var dl='<datalist id="'+id+'">'+ state.opts[key].map(function(o){ return '<option value="'+esc(o)+'">'; }).join("") +'</datalist>';
      return '<input data-k="'+key+'" list="'+id+'" value="'+esc(val)+'" placeholder="pick or type new…">'+dl;
    }
    var t=(kind==="num"||kind==="int")?"number":"text"; var step=kind==="num"?' step="any"':'';
    return '<input data-k="'+key+'" type="'+t+'"'+step+' value="'+esc(val)+'">';
  }
  function selectCoaster(id){
    state.sel = id; renderCoasters();
    var c = state.byId[id];
    var fields = FIELDS.map(function(f){
      var cls = (f[0]==="name"||f[0]==="park"||f[0]==="loc") ? "fld full" : "fld";
      return '<div class="'+cls+'"><label>'+esc(f[1])+'</label>'+fieldControl(c,f)+'</div>';
    }).join("");
    var geoNote = geocoded(c.park) ? '<span class="badge onmap">park on map</span>' : '<span class="badge nomap">park not geocoded — add it in the Parks tab</span>';
    document.getElementById('editor').innerHTML =
      '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><h2 style="margin:0;font-size:1.15rem">'+esc(c.name)+'</h2>'+
        '<span style="color:var(--muted)">#'+c.id+'</span>'+geoNote+'</div>'+
      '<p class="hint">Edits update this coaster everywhere — every rider’s page reflects it automatically (they reference it by id).</p>'+
      '<div class="grid" id="form">'+fields+'</div>'+
      '<div class="actions"><button id="save">Save changes</button><button class="ghost" id="revert">Revert</button><span class="toast" id="toast"></span></div>'+
      '<div class="toolbar"><h3>Merge duplicate</h3><p class="hint">Merge this into another coaster: all riders’ credits move to the target id, then this one is deleted.</p>'+
        '<div class="inline"><span>Merge #'+c.id+' → id</span><input id="mergeTo" type="number" style="width:110px" placeholder="target id"><button class="danger" id="mergeBtn">Merge</button></div></div>';
    document.getElementById('save').addEventListener('click', saveCoaster);
    document.getElementById('revert').addEventListener('click', function(){ selectCoaster(id); });
    document.getElementById('mergeBtn').addEventListener('click', mergeCoaster);
  }
  function readForm(){
    var body={};
    [].forEach.call(document.querySelectorAll('#form [data-k]'), function(inp){
      var k=inp.getAttribute('data-k'), v=(inp.value||"").trim(), kind=fieldKind(k);
      if (v==="") body[k]=null; else if (kind==="int") body[k]=parseInt(v,10); else if (kind==="num") body[k]=Number(v); else body[k]=v;
    });
    return body;
  }
  async function saveCoaster(){
    var id=state.sel, toast=document.getElementById('toast'); toast.textContent="Saving…"; toast.className="toast";
    try {
      var body = readForm(); await api("PUT","/api/coaster/"+id, body); Object.assign(state.byId[id], body);
      state.opts = { loc:distinct("loc"), manu:distinct("manu"), model:distinct("model") };
      toast.textContent="Saved ✓"; toast.className="toast good"; renderCoasters();
    } catch(e){ toast.textContent="Error: "+e.message; toast.className="toast bad"; }
  }
  async function mergeCoaster(){
    var from=state.sel, to=parseInt(document.getElementById('mergeTo').value,10);
    if(!to){ alert("Enter a target coaster id."); return; }
    if(!state.byId[to]){ alert("No coaster with id "+to+"."); return; }
    if(!confirm("Merge #"+from+" ("+state.byId[from].name+") into #"+to+" ("+state.byId[to].name+")?")) return;
    try {
      await api("POST","/api/merge",{ from:from, to:to });
      state.coasters = state.coasters.filter(function(c){ return c.id!==from; }); delete state.byId[from]; state.sel=null;
      document.getElementById('editor').innerHTML='<div class="empty">Merged into #'+to+'.</div>'; renderCoasters();
    } catch(e){ alert("Merge failed: "+e.message); }
  }

  // ---------- parks editor ----------
  async function loadParks(){
    var d = await api("GET","/api/parks-all"); state.parks = d.parks; renderParks(); updateGeoSummary();
  }
  function renderParks(){
    var q = document.getElementById('q').value.trim().toLowerCase();
    var rows = state.parks.filter(function(p){ return !q || (p.name||"").toLowerCase().indexOf(q)>=0; });
    var onMap = state.parks.filter(function(p){ return p.lat!=null; }).length;
    document.getElementById('count').textContent = rows.length + " shown · " + onMap + "/" + state.parks.length + " on map";
    document.getElementById('list').innerHTML = rows.map(function(p){
      var on = p.lat!=null;
      var pin = '<span class="pin '+(on?'on':'off')+'">'+(on?'●':'○')+'</span>';
      return '<div class="row'+(state.selPark===p.name?' sel':'')+'" data-id="'+esc(p.name)+'">'+
        '<div class="nm">'+pin+esc(p.name)+ (on?'<span class="badge onmap">on map</span>':'<span class="badge nomap">needs coords</span>') +'</div>'+
        '<div class="pk">'+p.coasters+' coaster'+(p.coasters==1?'':'s')+ (on? ' · '+p.lat.toFixed(3)+', '+p.lon.toFixed(3) : '') +'</div></div>';
    }).join("");
  }
  function selectPark(name){
    state.selPark = name; renderParks();
    var p = state.parks.filter(function(x){ return x.name===name; })[0]; if(!p) return;
    document.getElementById('editor').innerHTML =
      '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><h2 style="margin:0;font-size:1.15rem">'+esc(p.name)+'</h2>'+
        '<span style="color:var(--muted)">'+p.coasters+' coaster'+(p.coasters==1?'':'s')+'</span></div>'+
      '<p class="hint">Coordinates put this park on the map. Find them on '+
        '<a class="osm" target="_blank" rel="noopener" href="https://www.openstreetmap.org/search?query='+encodeURIComponent(p.name)+'">OpenStreetMap ↗</a>'+
        ' or Google Maps (right-click a spot → the lat,lon shows at the top).</p>'+
      '<div class="grid"><div class="fld"><label>Latitude</label><input id="plat" type="number" step="any" value="'+(p.lat==null?"":p.lat)+'"></div>'+
        '<div class="fld"><label>Longitude</label><input id="plon" type="number" step="any" value="'+(p.lon==null?"":p.lon)+'"></div>'+
        '<div class="fld full"><label>Region (grouping label, e.g. "Ohio, US" or "Japan")</label><input id="preg" value="'+esc(p.region==null?"":p.region)+'"></div></div>'+
      '<div class="actions"><button id="psave">Save park</button><span class="toast" id="ptoast"></span></div>';
    document.getElementById('psave').addEventListener('click', function(){ savePark(name); });
  }
  async function savePark(name){
    var toast=document.getElementById('ptoast'); toast.textContent="Saving…"; toast.className="toast";
    var lat=document.getElementById('plat').value.trim(), lon=document.getElementById('plon').value.trim(), reg=document.getElementById('preg').value.trim();
    try {
      await api("PUT","/api/park",{ name:name, lat:lat===""?null:Number(lat), lon:lon===""?null:Number(lon), region:reg||null });
      var p = state.parks.filter(function(x){ return x.name===name; })[0];
      if(p){ p.lat=lat===""?null:Number(lat); p.lon=lon===""?null:Number(lon); p.region=reg||null; }
      if(p && p.lat!=null) state.geo[name]=p; else delete state.geo[name];
      toast.textContent="Saved ✓"; toast.className="toast good"; renderParks(); updateGeoSummary();
    } catch(e){ toast.textContent="Error: "+e.message; toast.className="toast bad"; }
  }

  // ---------- geocoding ----------
  async function geocode(){
    var stat=document.getElementById('geostat'); var total=0; document.getElementById('geo').disabled=true;
    try {
      while (true){
        var d = await api("POST","/api/admin/geocode"); total += (d.added||0);
        stat.textContent = "geocoded "+total+"… "+(d.remaining||0)+" left";
        if (!d.remaining || !d.added) break;
      }
      stat.textContent = "done — "+total+" placed";
      await loadGeo(); if (state.mode==='parks') await loadParks(); render();
    } catch(e){ stat.textContent = "error: "+e.message; }
    document.getElementById('geo').disabled=false;
  }
  </script>
</body>
</html>
