<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">
<title>Coasters — Coaster Hub</title>
<meta name="description" content="Roller coaster lists on Coaster Hub — per rider, or the combined list.">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="Coaster Hub — Coasters">
<meta property="og:image" content="https://coasterhub.org/og-image.png">
<style>
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 18px}
  .controls input,.controls select{background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:10px 12px;border-radius:10px;font-size:.9rem}
  .controls input{min-width:220px;flex:1}
  .controls select{cursor:pointer;max-width:200px}
  .controls button{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:.9rem}
  .controls button:hover{color:var(--fg)}
  .count{color:var(--muted);font-size:.85rem;margin-bottom:12px}
  .count b{color:var(--accent2)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
  table{border-collapse:collapse;width:100%;font-size:.85rem;white-space:nowrap}
  thead th{position:sticky;top:0;background:#0e1730;color:var(--muted);text-align:left;padding:11px 12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:.72rem;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
  thead th:hover{color:var(--fg)}
  thead th.num{text-align:right}
  thead th .ar{color:var(--accent);margin-left:4px}
  tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05)}
  tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:rgba(55,208,200,.06)}
  tbody td.name{font-weight:600;color:var(--fg)}
  .pill{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
  .pill.steel{color:var(--accent2)}.pill.wood{color:var(--accent)}
  .pill.op{color:var(--accent2)}.pill.def{color:var(--accent)}
  .cyear{color:var(--muted);font-size:.78rem;margin-left:5px}
  td.muted{color:var(--muted)}
  #loading{color:var(--muted);padding:40px 0}
  #err{display:none;background:var(--panel);border:1px solid var(--accent);border-radius:12px;padding:20px;color:var(--fg)}
  #err code{color:var(--accent2)}
</style>
</head>
<body>
<header class="nav"><div class="container nav-inner">
  <a class="brand" href="/">
    <img src="mark.svg" alt="" class="brand-mark" width="40" height="40">
    <span class="brand-text">Coaster <b>Hub</b></span>
  </a>
  <nav class="links">
    <a href="/" data-nav="home">Home</a>
    <a href="/stats" data-nav="stats">Stats</a>
    <a href="/coasters" data-nav="coasters">Coasters</a>
  </nav>
  <div class="people" id="people"></div>
</div></header>

<section class="hero" style="padding:56px 0 30px"><div class="container">
  <span class="badge">The list</span>
  <h1 style="max-width:20ch">Loading&hellip;</h1>
  <p>Filter and sort every coaster.</p>
</div></section>

<section class="block" style="padding-top:24px"><div class="container">
  <div id="err">
    <strong>Couldn&rsquo;t load the data.</strong> This page reads external data files, so it needs to be served over the web.
  </div>
  <div id="loading">Loading coasters&hellip;</div>
  <div id="ui" style="display:none">
    <div class="controls">
      <input id="q" type="search" placeholder="Search name, park, manufacturer, model&hellip;">
      <select id="f_status"><option value="">All statuses</option><option value="Operating">Operating</option><option value="Defunct">Defunct</option></select>
      <select id="f_type"><option value="">All types</option></select>
      <select id="f_manu"><option value="">All manufacturers</option></select>
      <select id="f_model"><option value="">All models</option></select>
      <select id="f_park"><option value="">All parks</option></select>
      <select id="f_loc"><option value="">All locations</option></select>
      <button id="reset">Reset</button>
    </div>
    <div class="count" id="count"></div>
    <div class="tbl-wrap"><table><thead><tr id="head"></tr></thead><tbody id="body"></tbody></table></div>
  </div>
</div></section>

<footer class="site"><div class="container foot-inner">
  <div>&copy; <span id="y"></span> Coaster Hub &middot; coasterhub.org</div>
  <div><a href="/">Home</a> &nbsp;&middot;&nbsp; <a href="/stats">Stats</a> &nbsp;&middot;&nbsp; <a href="/coasters">Coasters</a></div>
</div></footer>

<script src="app.js"></script>
<script>
document.getElementById('y').textContent=new Date().getFullYear();
CoasterHub.initNav('coasters');
var DATA=[];
var ALLCOLS=[
 {k:'name',t:'Name',num:false,cls:'name'},
 {k:'park',t:'Park',num:false},
 {k:'loc',t:'Location',num:false},
 {k:'type',t:'Type',num:false},
 {k:'manu',t:'Manufacturer',num:false},
 {k:'model',t:'Model',num:false},
 {k:'yr',t:'Year',num:true},
 {k:'first',t:'First Ridden',num:false},
 {k:'rides',t:'Rides',num:true},
 {k:'h',t:'Height (ft)',num:true},
 {k:'s',t:'Speed (mph)',num:true},
 {k:'l',t:'Length (ft)',num:true},
 {k:'inv',t:'Inv',num:true},
 {k:'status',t:'Status',num:false}
];
var COLS=ALLCOLS;
var sortKey='park', sortDir=1;
var FILTS=['q','f_status','f_type','f_manu','f_model','f_park','f_loc'];
function esc(t){return String(t).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function setHero(badge,h1,p){
  document.querySelector('.hero .badge').textContent=badge;
  document.querySelector('.hero h1').textContent=h1;
  document.querySelector('.hero p').textContent=p;
}
function fail(e){console.error(e);document.getElementById('loading').style.display='none';document.getElementById('err').style.display='block';}
function finish(){document.getElementById('loading').style.display='none';document.getElementById('ui').style.display='block';init();}

if(CoasterHub.currentUser()){
  CoasterHub.loadUser().then(function(s){
    DATA=s.coasters.filter(function(c){return s.byCoaster[c.id];}).map(function(c){
      var d=s.byCoaster[c.id];
      return Object.assign({},c,{rides:d.rides,first:d.first,status:c.closed?'Defunct':'Operating'});
    });
    var anyFirst=DATA.some(function(c){return c.first;});
    var anyRides=DATA.some(function(c){return c.rides!=null;});
    COLS=ALLCOLS.filter(function(col){
      if(col.k==='first')return anyFirst;
      if(col.k==='rides')return anyRides;
      return true;
    });
    var nm=String(s.userName||'Carter').replace(/[&<>"]/g,'');
    setHero('The full list','Every coaster in '+nm+'’s count.',
      'All '+DATA.length.toLocaleString()+' credits — filter and sort by park, manufacturer, model, status, or stats.');
    document.title=nm+'’s Coasters — Coaster Hub';
    finish();
  }).catch(fail);
} else {
  fetch('/coasters.json').then(function(r){return r.json();}).then(function(j){
    DATA=j.coasters.map(function(c){return Object.assign({},c,{status:c.closed?'Defunct':'Operating'});});
    COLS=ALLCOLS.filter(function(col){return col.k!=='first'&&col.k!=='rides';});
    setHero('The combined list','Combined list · '+DATA.length.toLocaleString()+' coasters.',
      'A combination of everyone’s lists — every coaster ridden across Carter, Cole & Max’s counts. Filter and sort by park, manufacturer, model, status, or stats.');
    document.title='Combined list — Coaster Hub';
    finish();
  }).catch(fail);
}

function init(){
  ['f_type|type','f_manu|manu','f_model|model','f_park|park','f_loc|loc'].forEach(function(pair){
    var id=pair.split('|')[0], key=pair.split('|')[1];
    var vals=[...new Set(DATA.map(function(c){return c[key];}).filter(Boolean))].sort(function(a,b){return String(a).localeCompare(String(b));});
    var sel=document.getElementById(id);
    vals.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
  });
  var head=document.getElementById('head');
  COLS.forEach(function(c){var th=document.createElement('th');th.textContent=c.t;if(c.num)th.className='num';
    th.dataset.k=c.k;th.onclick=function(){if(sortKey===c.k)sortDir*=-1;else{sortKey=c.k;sortDir=c.num?-1:1;}render();};
    head.appendChild(th);});
  FILTS.forEach(function(id){document.getElementById(id).addEventListener('input',render);});
  document.getElementById('reset').onclick=function(){FILTS.forEach(function(id){document.getElementById(id).value='';});sortKey='park';sortDir=1;render();};
  render();
}
function current(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  var fs=document.getElementById('f_status').value,ft=document.getElementById('f_type').value,
      fm=document.getElementById('f_manu').value,fmo=document.getElementById('f_model').value,
      fp=document.getElementById('f_park').value,fl=document.getElementById('f_loc').value;
  var rows=DATA.filter(function(c){
    if(fs&&c.status!==fs)return false; if(ft&&c.type!==ft)return false; if(fm&&c.manu!==fm)return false;
    if(fmo&&c.model!==fmo)return false; if(fp&&c.park!==fp)return false; if(fl&&c.loc!==fl)return false;
    if(q){var hay=(c.name+' '+c.park+' '+(c.model||'')+' '+(c.manu||'')+' '+(c.loc||'')).toLowerCase();if(hay.indexOf(q)<0)return false;}
    return true;});
  rows.sort(function(a,a2){var x=a[sortKey],y=a2[sortKey],c;
    if(x==null&&y==null)c=0; else if(x==null)c=1; else if(y==null)c=-1;
    else if(typeof x==='string')c=x.localeCompare(y)*sortDir; else c=(x-y)*sortDir;
    if(c!==0)return c;
    return String(a.name).localeCompare(String(a2.name));});
  return rows;
}
function render(){
  var rows=current();
  document.getElementById('count').innerHTML='Showing <b>'+rows.length.toLocaleString()+'</b> of '+DATA.length.toLocaleString()+' coasters';
  var head=document.getElementById('head');
  head.querySelectorAll('th').forEach(function(th){var a=th.querySelector('.ar');if(a)a.remove();
    if(th.dataset.k===sortKey){var sp=document.createElement('span');sp.className='ar';sp.textContent=sortDir<0?'▼':'▲';th.appendChild(sp);}});
  document.getElementById('body').innerHTML=rows.map(function(c){return '<tr>'+COLS.map(function(col){
    var v=c[col.k];
    if(col.k==='type')return '<td>'+(v?'<span class="pill '+(v==='Wood'?'wood':'steel')+'">'+v+'</span>':'<span class="muted">—</span>')+'</td>';
    if(col.k==='status')return c.closed?'<td><span class="pill def">Defunct</span><span class="cyear">'+String(c.closed).slice(0,4)+'</span></td>':'<td><span class="pill op">Operating</span></td>';
    if(v==null||v==='')return '<td class="muted">—</td>';
    return '<td class="'+(col.num?'num':'')+' '+(col.cls||'')+'">'+esc(v)+'</td>';
  }).join('')+'</tr>';}).join('');
}
</script>
</body>
</html>
