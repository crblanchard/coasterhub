<style>
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 18px}
  .controls input,.controls select{background:var(--panel);border:1px solid var(--line);color:var(--fg);
    padding:10px 12px;border-radius:10px;font-size:.9rem}
  .controls input{min-width:220px;flex:1}
  .controls select{cursor:pointer;max-width:200px}
  .controls button{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:10px 14px;cursor:pointer;font-size:.9rem}
  .controls button:hover{color:var(--fg)}
  .count{color:var(--muted);font-size:.85rem;margin-bottom:12px}
  .count b{color:var(--accent2)}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
  table{border-collapse:collapse;width:100%;font-size:.85rem;white-space:nowrap}
  thead th{position:sticky;top:0;background:#0e1730;color:var(--muted);text-align:left;padding:11px 12px;
    font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:.72rem;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
  thead th:hover{color:var(--fg)}
  thead th.num{text-align:right}
  thead th .ar{color:var(--accent);margin-left:4px}
  tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05)}
  tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:rgba(55,208,200,.06)}
  tbody td.name{font-weight:600;color:var(--fg)}
  .pill{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:999px;border:1px solid var(--line)}
  .pill.steel{color:var(--accent2)}.pill.wood{color:var(--accent)}
  .pill.op{color:var(--accent2)}.pill.def{color:var(--accent)}
  .cyear{color:var(--muted);font-size:.78rem;margin-left:5px}
  td.muted{color:var(--muted)}
</style>

  const q=document.getElementById('q').value.trim().toLowerCase();
  const fs=document.getElementById('f_status').value,ft=document.getElementById('f_type').value,
        fm=document.getElementById('f_manu').value,fmo=document.getElementById('f_model').value,
        fp=document.getElementById('f_park').value,fl=document.getElementById('f_loc').value;
  let rows=DATA.filter(c=>{
    if(fs&&c.status!==fs)return false; if(ft&&c.type!==ft)return false; if(fm&&c.manu!==fm)return false;
    if(fmo&&c.model!==fmo)return false; if(fp&&c.park!==fp)return false; if(fl&&c.loc!==fl)return false;
    if(q){const hay=(c.name+' '+c.park+' '+(c.model||'')+' '+(c.manu||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;});
  rows.sort((a,a2)=>{let x=a[sortKey],y=a2[sortKey];
    if(x==null&&y==null)return 0; if(x==null)return 1; if(y==null)return -1;
    if(typeof x==='string')return x.localeCompare(y)*sortDir;
    return (x-y)*sortDir;});
  return rows;
}
function render(){
  const rows=current();
  document.getElementById('count').innerHTML='Showing <b>'+rows.length+'</b> of '+DATA.length+' coasters';
  head.querySelectorAll('th').forEach(th=>{th.querySelector('.ar')?.remove();
    if(th.dataset.k===sortKey){const s=document.createElement('span');s.className='ar';s.textContent=sortDir<0?'▼':'▲';th.appendChild(s);}});
  document.getElementById('body').innerHTML=rows.map(c=>'<tr>'+COLS.map(col=>{
    let v=c[col.k];
    if(col.k==='type')return `<td><span class="pill ${v==='Wood'?'wood':'steel'}">${v}</span></td>`;
    if(col.k==='status'){return c.closed
        ? `<td><span class="pill def">Defunct</span><span class="cyear">${c.closed}</span></td>`
        : `<td><span class="pill op">Operating</span></td>`;}
    if(v==null||v==='')return '<td class="muted">—</td>';
    return `<td class="${col.num?'num':''} ${col.cls||''}">${v}</td>`;
  }).join('')+'</tr>').join('');
}
FILTS.forEach(id=>document.getElementById(id).addEventListener('input',render));
document.getElementById('reset').onclick=()=>{FILTS.forEach(id=>document.getElementById(id).value='');sortKey='rides';sortDir=-1;render();};
render();
</script>
</body>
</html>
